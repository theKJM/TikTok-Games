<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Talent Show Scoreboard</title>

<style>
@font-face {
  font-family: "SevenSeg";
  src: url("7seg.woff2") format("woff2");
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  background: #050505;
  color: white;
  font-family: Verdana, sans-serif;
  overflow-x: hidden;
}

.wrapper {
  min-height: 100vh;
  padding: 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.top-title {
  width: 90%;
  max-width: 900px;
  height: 70px;
  font-size: 34px;
  text-align: center;
  background: #111;
  color: white;
  border: 3px solid white;
  border-radius: 12px;
  margin-bottom: 20px;
  font-family: Verdana, sans-serif;
}

.score-box {
  width: 90%;
  max-width: 900px;
  height: 260px;
  background: #100000;
  border: 5px solid red;
  border-radius: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 0 35px red;
  margin-bottom: 20px;
}

.main-score {
  font-family: "SevenSeg", monospace;
  font-size: clamp(80px, 18vw, 210px);
  color: red;
  text-shadow: 0 0 12px red, 0 0 30px red;
  letter-spacing: 4px;
}

.timer-box {
  width: 90%;
  max-width: 600px;
  height: 90px;
  background: #111;
  border: 3px solid white;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 25px;
}

.timer-digits {
  font-family: "SevenSeg", monospace;
  font-size: 58px;
  color: lime;
  text-shadow: 0 0 12px lime;
}

.stats-row {
  width: 90%;
  max-width: 900px;
  display: flex;
  gap: 20px;
  justify-content: center;
  margin-bottom: 25px;
}

.stat-label-box {
  width: 120px;
  height: 70px;
  background: #111;
  border: 3px solid white;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.stat-label {
  font-family: Verdana, sans-serif;
  font-size: 26px;
  color: white;
}

.stat-number-box {
  flex: 1;
  height: 70px;
  background: #100000;
  border: 3px solid red;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 0 18px red;
}

.stat-number {
  font-family: "SevenSeg", monospace;
  font-size: 46px;
  color: red;
  text-shadow: 0 0 10px red;
}

.name-box {
  width: 90%;
  max-width: 700px;
  height: 60px;
  font-size: 28px;
  text-align: center;
  background: #111;
  color: white;
  border: 3px solid white;
  border-radius: 12px;
  margin-bottom: 20px;
  font-family: Verdana, sans-serif;
}

.controls {
  width: 90%;
  max-width: 900px;
  background: #111;
  border: 2px solid #444;
  border-radius: 14px;
  padding: 18px;
  display: grid;
  gap: 12px;
}

button, select, input {
  font-size: 18px;
  padding: 10px;
  border-radius: 8px;
  border: none;
  font-family: Verdana, sans-serif;
}

button {
  background: #222;
  color: white;
  border: 2px solid white;
}

button:active {
  transform: scale(0.97);
}

.control-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 10px;
}

.color-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
  gap: 10px;
}

label {
  font-size: 15px;
  color: #ddd;
}

@media (max-width: 600px) {
  .stats-row {
    flex-direction: column;
  }

  .stat-label-box {
    width: 100%;
  }

  .top-title {
    font-size: 24px;
  }
}
</style>
</head>

<body>
<div class="wrapper">

  <input class="top-title" id="titleInput" placeholder="Framboys Live" />

  <div class="score-box">
    <div class="main-score" id="scoreDisplay">0</div>
  </div>

  <div class="timer-box">
    <div class="timer-digits" id="timerDisplay">00:00.0</div>
  </div>

  <div class="stats-row">
    <div class="stat-label-box">
      <div class="stat-label">AVG</div>
    </div>
    <div class="stat-number-box">
      <div class="stat-number" id="avgDisplay">0</div>
    </div>
  </div>

  <div class="stats-row">
    <div class="stat-label-box">
      <div class="stat-label">MAX</div>
    </div>
    <div class="stat-number-box">
      <div class="stat-number" id="maxDisplay">0</div>
    </div>
  </div>

  <input class="name-box" id="nameInput" placeholder="" />

  <div class="controls">

    <div class="control-grid">
      <button onclick="addScore(1)">+1</button>
      <button onclick="addScore(10)">+10</button>
      <button onclick="addScore(100)">+100</button>
      <button onclick="addScore(1000)">+1,000</button>
      <button onclick="addScore(10000)">+10K</button>
      <button onclick="addScore(100000)">+100K</button>
      <button onclick="addScore(1000000)">+1M</button>
      <button onclick="addScore(100000000)">+100M</button>
    </div>

    <div class="control-grid">
      <button onclick="resetScore()">Reset Score</button>
      <button onclick="startTimer()">Start Timer</button>
      <button onclick="pauseTimer()">Pause Timer</button>
      <button onclick="resetTimer()">Reset Timer</button>
    </div>

    <label>Custom Score Cap</label>
    <input type="number" id="customCap" placeholder="Example: 1000000" />

    <button onclick="applyCustomCap()">Apply Custom Score Cap</button>

    <div class="color-row">
      <label>
        Digit Color
        <input type="color" id="digitColor" value="#ff0000" onchange="applyColors()" />
      </label>

      <label>
        Box Color
        <input type="color" id="boxColor" value="#100000" onchange="applyColors()" />
      </label>

      <label>
        Border Color
        <input type="color" id="borderColor" value="#ff0000" onchange="applyColors()" />
      </label>

      <label>
        Text Box Color
        <input type="color" id="textBoxColor" value="#111111" onchange="applyColors()" />
      </label>
    </div>

  </div>
</div>

<script>
let score = 0;
let maxScore = 0;
let scoreHistory = [];
let scoreCap = 1000000000000000;

let timerRunning = false;
let timerStart = 0;
let timerElapsed = 0;
let timerInterval = null;

function toSevenSegText(value) {
  return String(value)
    .replaceAll("6", "b")
    .replaceAll("9", "q");
}

function formatScore(num) {
  if (num < 1000) return String(num);
  if (num < 10000) return num.toLocaleString();

  const units = [
    { value: 1e15, suffix: "Q" },
    { value: 1e12, suffix: "T" },
    { value: 1e9, suffix: "B" },
    { value: 1e6, suffix: "M" },
    { value: 1e3, suffix: "K" }
  ];

  for (const unit of units) {
    if (num >= unit.value) {
      let short = num / unit.value;
      return short.toFixed(short >= 100 ? 0 : short >= 10 ? 1 : 2).replace(/\.0+$/, "") + unit.suffix;
    }
  }

  return String(num);
}

function updateDisplay() {
  const scoreText = toSevenSegText(formatScore(score));
  const maxText = toSevenSegText(formatScore(maxScore));

  let avg = 0;
  if (scoreHistory.length > 0) {
    avg = Math.round(scoreHistory.reduce((a, b) => a + b, 0) / scoreHistory.length);
  }

  const avgText = toSevenSegText(formatScore(avg));

  document.getElementById("scoreDisplay").textContent = scoreText;
  document.getElementById("maxDisplay").textContent = maxText;
  document.getElementById("avgDisplay").textContent = avgText;
}

function addScore(amount) {
  score += amount;

  if (score > scoreCap) {
    score = scoreCap;
  }

  scoreHistory.push(score);

  if (score > maxScore) {
    maxScore = score;
  }

  updateDisplay();
}

function resetScore() {
  score = 0;
  maxScore = 0;
  scoreHistory = [];
  updateDisplay();
}

function applyCustomCap() {
  const input = Number(document.getElementById("customCap").value);

  if (input > 0) {
    scoreCap = input;
    if (score > scoreCap) score = scoreCap;
    updateDisplay();
  }
}

function startTimer() {
  if (timerRunning) return;

  timerRunning = true;
  timerStart = Date.now() - timerElapsed;

  timerInterval = setInterval(updateTimer, 50);
}

function pauseTimer() {
  timerRunning = false;
  clearInterval(timerInterval);
}

function resetTimer() {
  timerRunning = false;
  clearInterval(timerInterval);
  timerElapsed = 0;
  document.getElementById("timerDisplay").textContent = "00:00.0";
}

function updateTimer() {
  timerElapsed = Date.now() - timerStart;

  const totalTenths = Math.floor(timerElapsed / 100);
  const tenths = totalTenths % 10;
  const totalSeconds = Math.floor(totalTenths / 10);
  const seconds = totalSeconds % 60;
  const minutes = Math.floor(totalSeconds / 60) % 60;
  const hours = Math.floor(totalSeconds / 3600);
  const days = Math.floor(hours / 24);

  let display;

  if (days > 0) {
    display = `${days}d ${String(hours % 24).padStart(2, "0")}:${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}.${tenths}`;
  } else if (hours > 0) {
    display = `${String(hours).padStart(2, "0")}:${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}.${tenths}`;
  } else {
    display = `${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}.${tenths}`;
  }

  document.getElementById("timerDisplay").textContent = toSevenSegText(display);
}

function applyColors() {
  const digitColor = document.getElementById("digitColor").value;
  const boxColor = document.getElementById("boxColor").value;
  const borderColor = document.getElementById("borderColor").value;
  const textBoxColor = document.getElementById("textBoxColor").value;

  const scoreBoxes = document.querySelectorAll(".score-box, .stat-number-box");
  const digitElements = document.querySelectorAll(".main-score, .stat-number");

  scoreBoxes.forEach(box => {
    box.style.background = boxColor;
    box.style.borderColor = borderColor;
    box.style.boxShadow = `0 0 25px ${borderColor}`;
  });

  digitElements.forEach(el => {
    el.style.color = digitColor;
    el.style.textShadow = `0 0 12px ${digitColor}, 0 0 30px ${digitColor}`;
  });

  document.querySelectorAll(".top-title, .name-box, .timer-box, .stat-label-box, .controls").forEach(box => {
    box.style.background = textBoxColor;
  });
}

updateDisplay();
</script>

</body>
</html>
